<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Simple flower icon for Maya -->
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Center circle -->
  <circle cx="16" cy="16" r="6" fill="#10b981"/>
  
  <!-- 6 petals -->
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(0 16 16)"/>
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(60 16 16)"/>
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(120 16 16)"/>
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(180 16 16)"/>
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(240 16 16)"/>
  <ellipse cx="16" cy="8" rx="5" ry="8" fill="url(#petalGrad)" transform="rotate(300 16 16)"/>
</svg>
